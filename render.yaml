# Blueprint Render: app web + Postgres
# Dashboard: https://dashboard.render.com → New → Blueprint → este repo

databases:
  - name: turnon-db
    plan: free
    databaseName: appturnos
    user: turnon

services:
  - type: web
    name: turnon
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "3001"
      - key: LAN_MODE
        value: "0"
      - key: TRUST_PROXY
        value: "1"
      - key: DB_TZ
        value: America/Bogota
      - key: DB_SSL
        value: "1"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: turnon-db
          property: connectionString
