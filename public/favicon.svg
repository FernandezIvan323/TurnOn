<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>AppTurnos</title>
  <!-- Plato: anillo exterior -->
  <circle cx="32" cy="36" r="22" stroke="#4a6b3a" stroke-width="2.5"/>
  <!-- Plato: anillo interior (sutil) -->
  <circle cx="32" cy="36" r="15" stroke="#4a6b3a" stroke-width="1.5" opacity="0.45"/>
  <!-- Tenedor (izquierda): mango -->
  <line x1="18" y1="6" x2="18" y2="58" stroke="#4a6b3a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tenedor: 3 puas -->
  <line x1="13" y1="6" x2="13" y2="20" stroke="#4a6b3a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="18" y1="6" x2="18" y2="20" stroke="#4a6b3a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="23" y1="6" x2="23" y2="20" stroke="#4a6b3a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Tenedor: base de las puas -->
  <line x1="13" y1="20" x2="23" y2="20" stroke="#4a6b3a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Cuchillo (derecha): mango -->
  <line x1="46" y1="22" x2="46" y2="58" stroke="#4a6b3a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cuchillo: hoja -->
  <path d="M 42 6 Q 50 12 50 22 L 46 22 Z" fill="#4a6b3a"/>
</svg>
