<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>TurnOn</title>
  <!-- Fondo sólido: alto contraste en cualquier UI -->
  <rect width="64" height="64" rx="14" fill="#2c4025"/>
  <!-- Plato (anillo exterior) -->
  <circle cx="32" cy="34" r="18" stroke="#fdf9ed" stroke-width="3"/>
  <!-- Plato (anillo interior) -->
  <circle cx="32" cy="34" r="11" stroke="#fdf9ed" stroke-width="2" opacity="0.85"/>
  <!-- Centro del plato -->
  <circle cx="32" cy="34" r="4" fill="#fdf9ed" opacity="0.9"/>
  <!-- Tenedor (izquierda) -->
  <g stroke="#fdf9ed" stroke-linecap="round" stroke-linejoin="round">
    <line x1="17" y1="12" x2="17" y2="52" stroke-width="2.6"/>
    <line x1="12.5" y1="12" x2="12.5" y2="24" stroke-width="2"/>
    <line x1="17" y1="12" x2="17" y2="24" stroke-width="2"/>
    <line x1="21.5" y1="12" x2="21.5" y2="24" stroke-width="2"/>
    <line x1="12.5" y1="24" x2="21.5" y2="24" stroke-width="2"/>
  </g>
  <!-- Cuchillo (derecha) -->
  <g fill="#fdf9ed" stroke="#fdf9ed" stroke-linecap="round" stroke-linejoin="round">
    <path d="M43 12c4.5 4 6.5 9 6.5 14.5H45.5c0-4-1.5-7.5-4-10.5V12z" stroke-width="0.5"/>
    <line x1="45.5" y1="26.5" x2="45.5" y2="52" stroke-width="2.6"/>
  </g>
</svg>
